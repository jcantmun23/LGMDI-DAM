<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Ejercicio de selectores</title>
<link rel="stylesheet" href="css-table-colors.css">
<style type="text/css">

/* Selector universal para todas las filas */
tr:nth-child(1) td { background-color: teal; color: white; }
tr:nth-child(2) td { background-color: red; color: white; }
tr:nth-child(3) td { background-color: blue; color: white; }
tr:nth-child(4) td { background-color: orange; color: white; }
tr:nth-child(5) td { background-color: purple; color: white; }
tr:nth-child(6) td { background-color: olive; color: white; }
tr:nth-child(7) td { background-color: fuchsia; color: white; }
tr:nth-child(8) td { background-color: green; color: white; }

</style>
</head>
<body>
<table border="1">
<tr><td>teal</td><td>teal</td><td>teal</td></tr>
<tr><td>red</td><td>red</td><td>red</td></tr>
<tr><td>blue</td><td>blue</td><td>blue</td></tr>
<tr><td>orange</td><td>orange</td><td>orange</td></tr>
<tr><td>purple</td><td>purple</td><td>purple</td></tr>
<tr><td>olive</td><td>olive</td><td>olive</td></tr>
<tr><td>fuchsia</td><td>fuchsia</td><td>fuchsia</td></tr>
<tr><td>green</td><td>green</td><td>green</td></tr>
</table>
</body>
</html>
